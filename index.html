<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TravelBlog Pro v5</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif}
body{background:#f4f7fb;color:#333;transition:.3s}
body.dark{background:#121212;color:#eee}
nav{background:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.05)}
body.dark nav{background:#1e1e1e}
.logo{font-weight:600}
.menu{display:flex;gap:16px}
.menu a{cursor:pointer;text-decoration:none;color:inherit}
.hamburger{display:none;font-size:22px;cursor:pointer}
@media(max-width:700px){
.menu{display:none;flex-direction:column;position:absolute;top:60px;right:20px;background:white;padding:15px;border-radius:10px}
.menu.open{display:flex}
.hamburger{display:block}
}
header{padding:90px 20px;background:url("https://images.unsplash.com/photo-1469474968028-56623f02e42e") center/cover;color:white;text-align:center}
header h1{font-size:44px}
.container{max-width:1100px;margin:auto;padding:40px 20px}
.search input{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;margin:20px 0}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.filters button{padding:6px 10px;border:none;border-radius:8px;background:#ddd;cursor:pointer}
.blog-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:25px}
.card{background:white;border-radius:14px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,.08);cursor:pointer;transition:.25s}
.card:hover{transform:translateY(-4px)}
.card img{width:100%;height:180px;object-fit:cover}
.card-content{padding:20px}
.meta{font-size:12px;color:#888;margin-bottom:6px}
.tags{font-size:12px;color:#2d7ef7;margin-top:6px}
.pagination{display:flex;justify-content:center;gap:10px;margin-top:30px}
.pagination button{padding:6px 10px;border:none;border-radius:8px;background:#2d7ef7;color:white;cursor:pointer}
</style>
</head>
<body>

<nav>
<div class="logo">✈️ TravelBlog</div>
</nav>

<header>
<h1>Explore the World 🌍</h1>
<p>Travel stories and guides</p>
</header>

<div class="container">
<h2>TravelBlog Pro v5</h2>
<p>This ZIP contains the TravelBlog Pro v5 project. Open the HTML file in your browser to run the blog.</p>
</div>

</body>
</html>
